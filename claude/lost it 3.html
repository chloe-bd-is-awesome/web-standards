<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lost and Found</title>
    <style>
      * { box-sizing: border-box; }

      body {
        background: linear-gradient(rgb(0, 247, 255), rgb(32, 0, 128));
        background-repeat: no-repeat;
        min-width: 100%;
        min-height: 100vh;
        color: #fff;
        margin: 0;
        padding: 10px;
        font-size: 16px;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        height: fit-content;
        margin-left: 5%;
        font-size: 24px;
        color: #fff;
        padding: 8px 0;
      }

      #toggle-all-btn {
        background-image: url(images/toggle1.png);
        background-color: transparent;
        background-size: 100%;
        background-repeat: no-repeat;
        border: none;
        width: 30px;
        height: 20px;
        margin-left: 12px;
        padding: 0;
        cursor: pointer;
      }
      #toggle-all-btn:hover {
        background-image: url(images/icon.png);
      }

      /* ── Layout: sidebar list + pinboard ── */
      .layout {
        display: flex;
        flex: 1;
        gap: 16px;
        padding: 0 10px 10px;
      }

      /* ── Sidebar list (figcaptions) ── */
      .item-list {
        flex: 0 0 220px;
        background: rgba(255,255,255,0.12);
        border-radius: 12px;
        padding: 16px;
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255,255,255,0.25);
        height: fit-content;
      }
      .item-list h2 {
        margin: 0 0 12px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        opacity: 0.75;
      }
      .item-list ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .item-list li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 8px;
        background: rgba(255,255,255,0.08);
        transition: background 0.15s;
      }
      .item-list li:hover {
        background: rgba(255,255,255,0.2);
      }
      .item-list li .list-icon {
        width: 20px;
        height: 14px;
        object-fit: cover;
        flex-shrink: 0;
      }
      .item-list li a {
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        display: block;
      }
      .item-list li a:hover { text-decoration: underline; }

      /* ── Pinboard (random image pins) ── */
      .pinboard {
        position: relative;
        flex: 1;
        height: 80vh;
        overflow: visible;
      }

      .pin {
        position: absolute;
        cursor: pointer;
      }
      .pin img {
        width: 50px;
        height: 35px;
        display: block;
        object-fit: cover;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.35);
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .pin:hover img {
        transform: scale(1.1);
        box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      }
    </style>
  </head>

  <body>
    <header>
      Lost items
      <button id="toggle-all-btn" onclick="toggleAll()"></button>
    </header>

    <div class="layout">

      <!-- ── Sidebar: list of items ── -->
      <aside class="item-list">
        <h2>Items</h2>
        <ul id="items-list">
          <li>
            <img class="list-icon" src="images/icon.png" alt="icon" />
            <a href="items/1.html">blue waterbottle</a>
          </li>
          <li>
            <img class="list-icon" src="images/icon.png" alt="icon" />
            <a href="items/1.html">blue waterbottle</a>
          </li>
          <li>
            <img class="list-icon" src="images/icon.png" alt="icon" />
            <a href="items/1.html">blue waterbottle</a>
          </li>
          <li>
            <img class="list-icon" src="images/icon.png" alt="icon" />
            <a href="items/1.html">blue waterbottle</a>
          </li>
          <li>
            <img class="list-icon" src="images/icon.png" alt="icon" />
            <a href="items/1.html">blue waterbottle</a>
          </li>
          <li>
            <img class="list-icon" src="images/icon.png" alt="icon" />
            <a href="items/1.html">blue waterbottle</a>
          </li>
          <!-- Add more <li> entries here -->
        </ul>
      </aside>

      <!-- ── Pinboard: randomly placed image pins ── -->
      <main class="pinboard" id="pinboard">
        <figure class="pin">
          <a href="items/1.html"><img src="images/icon.png" alt="blue waterbottle" /></a>
        </figure>
        <figure class="pin">
          <a href="items/1.html"><img src="images/icon.png" alt="blue waterbottle" /></a>
        </figure>
        <figure class="pin">
          <a href="items/1.html"><img src="images/icon.png" alt="blue waterbottle" /></a>
        </figure>
        <figure class="pin">
          <a href="items/1.html"><img src="images/icon.png" alt="blue waterbottle" /></a>
        </figure>
        <figure class="pin">
          <a href="items/1.html"><img src="images/icon.png" alt="blue waterbottle" /></a>
        </figure>
        <figure class="pin">
          <a href="items/1.html"><img src="images/icon.png" alt="blue waterbottle" /></a>
        </figure>
        <!-- Add more <figure> pins here -->
      </main>

    </div>

    <script>
      const pins = document.querySelectorAll(".pin");
      const btn = document.getElementById("toggle-all-btn");
      const pinboard = document.getElementById("pinboard");

      // Randomly place each pin on the pinboard
      pins.forEach((pin) => {
        const boardW = pinboard.offsetWidth || window.innerWidth * 0.75;
        const boardH = pinboard.offsetHeight || window.innerHeight * 0.8;

        const x = 30 + Math.random() * (boardW - 120);
        const y = 20 + Math.random() * (boardH - 80);
        const rot = (Math.random() - 0.5) * 20; // subtle random rotation

        pin.style.left = `${x}px`;
        pin.style.top = `${y}px`;
        pin.style.transform = `rotate(${rot}deg)`;
        pin.style.margin = "0";
      });

      // Toggle button (kept for future use — no text/image swap needed now)
      let allText = false;
      function toggleAll() {
        allText = !allText;
        btn.textContent = allText ? "☑" : "☐";
      }
    </script>
  </body>
</html>
