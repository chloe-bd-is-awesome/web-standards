<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lost and Found</title>
    <link
      rel="stylesheet"
      href="style.css"
      rel="icon"
      href="images/favicon.png"
      type="image/png"
    />
  </head>

  <header
    style="
      color: black;
      height: 300vh;
      font-size: 500%;
      text-align: center;
      vertical-align: text-bottom;
      margin: 10%;
    "
  >
    LOST
    <br />
    <img
      src="images/paperclip.png"
      alt="paperclip"
      width="36px"
      height="48px"
    />
    <br />
    FOUND
  </header>

  <body>
    <main class="pinboard">
      <figure class="image-swap">
        <a href="lost it.html" class="image-swap">
          <img class="default-img" src="images/bin1.png" alt="Default" />
          <img class="hover-img" src="images/bin1turn.png" alt="Hover" />
        </a>
      </figure>

      <figure class="image-swap">
        <a href="found it.html" class="image-swap">
          <img class="default-img" src="images/bin2.png" alt="Default" />
          <img class="hover-img" src="images/bin2turn.png" alt="Hover" />
        </a>
      </figure>

      <figure class="image-swap">
        <a href="archive.html" class="image-swap">
          <img class="default-img" src="images/bin4.png" alt="Default" />
          <img class="hover-img" src="images/bin4turn.png" alt="Hover" />
        </a>
      </figure>

      <figure class="image-swap">
        <a href="beanies in the cinema.html" class="image-swap">
          <img class="default-img" src="images/bin3.png" alt="Default" />
          <img class="hover-img" src="images/bin3turn.png" alt="Hover" />
        </a>
      </figure>

      <!-- Copy and paste a <figure> block above to add more items -->
    </main>

    <script src="script.js"></script>
  </body>
</html>
